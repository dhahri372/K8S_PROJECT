---
- name: Initialiser le cluster Kubernetes
  command: kubeadm init --apiserver-advertise-address=192.168.56.10 --pod-network-cidr=10.244.0.0/16
  args:
    creates: /etc/kubernetes/admin.conf
  register: kubeadm_init

- name: Générer la commande join
  command: kubeadm token create --print-join-command 
  register: join_cmd

- name: Sauvegarder la commande join
  copy:
    content: "{{ join_cmd.stdout }}"
    dest: /vagrant/join-command.txt
    mode: '0644'

- name: Créer le dossier .kube pour vagrant
  file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant

- name: Copier le fichier admin.conf
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    remote_src: yes
    owner: vagrant
    group: vagrant

- name: Installer le réseau Flannel
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
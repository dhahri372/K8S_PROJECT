apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      nodeName: worker1  # C'est bien ici que tu forces le placement sur Worker 1
      containers:
      - name: mysql
        image: mysql:5.7
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password"
        - name: MYSQL_DATABASE
          value: "k8s_db"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  type: ClusterIP # Uniquement accessible à l'intérieur du cluster (par le backend)
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306